<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CircleLab - Circle Geometry Quiz</title>
  <link rel="stylesheet" href="quiz.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <nav class="navbar">
    <a href="../Homepage/index.html" class="logo brand-logo" aria-label="CircleLab homepage">
      <span class="brand-lockup" aria-hidden="true">
        <span class="brand-mark"></span>
        <span class="brand-text" id="logoImg">CircleLab</span>
      </span>
    </a>
    <ul class="nav-menu">
      <li><a href="../Homepage/index.html" class="nav-link" id="navHome">Homepage</a></li>
      <li><a href="quiz.html" class="nav-link active" id="navQuiz">Quiz</a></li>
      <li><a href="../Game/game.html" class="nav-link" id="navGame">Game</a></li>
    </ul>
    <div class="nav-right">
      <button class="lang-btn" id="langToggle">中文</button>
      <button class="theme-btn" id="themeToggle" title="Toggle day/night mode"><i class="fas fa-moon"></i></button>
      <button id="a11yToggleBtn" class="a11y-toggle-btn" type="button" aria-expanded="false">Accessibility</button>
      <div id="a11yPanel" class="a11y-panel" aria-label="Accessibility controls">
        <div class="a11y-controls">
          <button id="fontDownBtn" class="a11y-btn" type="button">A-</button>
          <button id="fontResetBtn" class="a11y-btn" type="button">A</button>
          <button id="fontUpBtn" class="a11y-btn" type="button">A+</button>
          <button id="colorSafeToggle" class="a11y-btn" type="button">Color Safe</button>
        </div>
      </div>
    </div>
  </nav>

  <div class="breadcrumb" id="breadcrumb"><a href="../Homepage/index.html">Homepage</a> &gt; Quiz</div>

  <main class="container">
    <section class="hero quiz-hero">
      <h1>Circle Geometry Quiz</h1>
      <p>Choose a difficulty and test your understanding with instant feedback.</p>
    </section>

    <section class="card quiz-shell">
      <div class="difficulty-selector" id="difficultySelector">
        <h3 id="diffPrompt">Select Difficulty Level</h3>
        <div class="diff-buttons">
          <button class="diff-btn" data-diff="easy" id="diffEasy">Easy</button>
          <button class="diff-btn" data-diff="medium" id="diffMedium">Medium</button>
          <button class="diff-btn" data-diff="hard" id="diffHard">Hard</button>
        </div>
      </div>

      <div class="quiz-header" id="quizHeader" style="display: none;">
        <span id="question-number">Question 1/5</span>
        <div class="score-info">
          <span id="score">Score: 0/5</span>
          <small id="points-per-question" style="display: none; color: #64748b; margin-left: 8px;">
            (1 point per question)
          </small>
        </div>
      </div>
    
      <h2 id="question-text" style="display: none;">What is the radius of a circle with equation x² + y² = 25?</h2>
    
      <div class="options-container" id="optionsContainer" style="display: none;"></div>
    
      <div class="nav-buttons" id="navButtons" style="display: none;">
        <button id="prevBtn" class="theorem-btn">Previous</button>
        <button id="nextBtn" class="theorem-btn">Next</button>
      </div>
    </section>
  </main>

  <script src="quiz.js"></script>
</body>
</html>
